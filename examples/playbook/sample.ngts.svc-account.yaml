config:
  connection:
    platform: NGTS
    url: '{{ Env "NGTS_URL" }}' # NGTS URL as environment variable
    credentials:
      clientId: '{{ Env "NGTS_CLIENT_ID" }}' # NGTS client ID as environment variable
      clientSecret: '{{ Env "NGTS_CLIENT_SECRET" }}' # NGTS client secret as environment variable
      scope: '{{ Env "NGTS_SCOPE" }}' # NGTS scope as environment variable
      tokenURL: '{{ Env "NGTS_TOKEN_URL" }}' # NGTS token URL as environment variable
certificateTasks:
  - name: myCertificate # Task Identifier, no relevance in tool run
    renewBefore: 31d
    request:
      csr: local
      subject:
        # Templating needs to go between single quotes to avoid issues when refreshing tokens and saving back
        commonName: '{{ Hostname | ToLower -}}.{{- Env "USERDNSDOMAIN" | ToLower }}'
        country: US
        locality: Salt Lake City
        state: Utah
        organization: Venafi Inc
        orgUnits:
          - engineering
          - marketing
      zone: "Open Source\\vcert"
    installations:
      - format: PEM
        file: "/path/to/my/certificate/cert.cer"
        chainFile: "/path/to/my/certificate/chain.cer"
        keyFile: "/path/to/my/certificate/key.pem"
        afterInstallAction: "echo Success!!!"