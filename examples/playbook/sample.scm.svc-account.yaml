config:
  connection:
    platform: SCM
    url: '{{ Env "SCM_URL" }}' # SCM URL as environment variable
    credentials:
      clientId: '{{ Env "SCM_CLIENT_ID" }}' # SCM client ID as environment variable
      clientSecret: '{{ Env "SCM_CLIENT_SECRET" }}' # SCM client secret as environment variable
      scope: '{{ Env "SCM_SCOPE" }}' # SCM scope as environment variable
      tokenURL: '{{ Env "SCM_TOKEN_URL" }}' # SCM token URL as environment variable
certificateTasks:
  - name: myCertificate # Task Identifier, no relevance in tool run
    renewBefore: 31d
    request:
      csr: local
      subject:
        # Templating needs to go between single quotes to avoid issues when refreshing tokens and saving back
        commonName: '{{ Hostname | ToLower -}}.{{- Env "USERDNSDOMAIN" | ToLower }}'
        country: US
        locality: Salt Lake City
        state: Utah
        organization: Venafi Inc
        orgUnits:
          - engineering
          - marketing
      zone: "Open Source\\vcert"
    installations:
      - format: PEM
        file: "/path/to/my/certificate/cert.cer"
        chainFile: "/path/to/my/certificate/chain.cer"
        keyFile: "/path/to/my/certificate/key.pem"
        afterInstallAction: "echo Success!!!"